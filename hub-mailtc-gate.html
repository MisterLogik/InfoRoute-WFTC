<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MailTC - Connexion</title>
    <link rel="stylesheet" href="/cst-style.css">
    <link rel="icon" type="image/png" href="/assets/favicon.png">
</head>
<body>

    <header class="main-header">
        <div class="logo-zone">
            <span class="waze-ghost">📬</span>
            <h1>Portail Gestion MAIL TeamClosure</h1>
        </div>
    </header>

    <div class="center-wrapper">
        <div class="login-card">
            <h2>Authentification</h2>
            <p class="login-subtitle">Accès restreint au système de messagerie interne</p>

            <form onsubmit="return verifierConnexion(event);">
                <div class="filter-group">
                    <label for="username">Nom utilisateur</label>
                    <input type="text" id="username" placeholder="ex: MonPseudoWaze" required autocomplete="off">
                </div>

                <div class="filter-group" style="margin-top: 15px;">
                    <label for="password">Mot de passe</label>
                    <input type="password" id="password" style="width: 100%; padding: 8px; border-radius: 4px; border: 1px solid var(--border-color); background-color: var(--bg-color); color: #fff; box-sizing: border-box;" placeholder="••••••••" required>
                </div>

                <span class="sub-label" style="color: var(--danger, #ff4d4d); background-color: rgba(255, 77, 77, 0.1); padding: 8px; border-radius: 4px; border-left: 2px solid var(--danger, #ff4d4d); margin-top: 15px; display: block; font-size: 0.8rem; line-height: 1.4;">
                    ⚠️ Le mot de passe n'est pas celui du compte waze associé.
                </span>

                <div class="form-actions" style="margin-top: 20px;">
                    <button type="submit" class="btn-primary">S'authentifier</button>
                </div>
            </form>

            <div class="back-link-container">
                <a href="index.html" class="link-back">← Retour au Hub principal</a>
            </div>
        </div>
    </div>

    <script>
        function verifierConnexion(event) {
            // Empêche le rechargement immédiat de la page
            event.preventDefault(); 
            
            const identifiant = document.getElementById('username').value.trim();
            const motDePasse = document.getElementById('password').value;

            // Vérification du mot de passe universellement requis
            if (motDePasse === "wftc2026") {
                // Stockage temporaire de l'identifiant pour s'en servir sur les pages suivantes (logs/interactions)
                sessionStorage.setItem('waze_logged_user', identifiant);
                
                // Redirection vers le hub mailtc
                window.location.href = "hub-mailtc.html";
            } else {
                // Boite de dialogue d'erreur si le mot de passe est faux
                alert("Le mot de passe est erroné");
            }
            
            return false;
        }
    </script>

</body>
</html>
