<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MailTC - Connexion</title>
    <link rel="stylesheet" href="/cst-style.css">
    <link rel="icon" type="image/png" href="/favicon.png">
</head>
<body>

    <header class="main-header">
        <div class="logo-zone">
            <span class="waze-ghost">📬</span>
            <h1>MailTC Gate</h1>
        </div>
    </header>

    <div class="center-wrapper">
        <div class="login-card">
            <h2>Authentification</h2>
            <p class="login-subtitle">Accès restreint au système de messagerie interne</p>

            <form onsubmit="alert('Simulation de connexion réussie !'); return false;">
                <div class="filter-group">
                    <label for="username">Identifiant unique ou Email</label>
                    <input type="text" id="username" placeholder="ex: admin_waze" required autocomplete="off">
                </div>

                <div class="filter-group" style="margin-top: 15px;">
                    <label for="password">Mot de passe</label>
                    <input type="password" id="password" style="width: 100%; padding: 8px; border-radius: 4px; border: 1px solid var(--border-color); background-color: var(--bg-color); color: #fff; box-sizing: border-box;" placeholder="••••••••" required>
                </div>

                <span class="sub-label" style="background-color: #1a1a1a; padding: 6px; border-radius: 4px; border-left: 2px solid var(--waze-blue);">
                    🔑 <strong>Accès Commun :</strong> <br>
                    User: <code>waze_team</code> | Pwd: <code>TC_pass74!</code>
                </span>

                <div class="form-actions">
                    <button type="submit" class="btn-primary">S'authentifier</button>
                </div>
            </form>

            <div class="back-link-container">
                <a href="index.html" class="link-back">← Retour au Hub principal</a>
            </div>
        </div>
    </div>

</body>
</html>
