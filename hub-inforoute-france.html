<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUB InfoRoute France (TeamClosure)</title>
    <link rel="stylesheet" href="/cst-style.css">
    <link rel="icon" type="image/png" href="/assets/favicon.png">
</head>
<body>

    <header class="main-header">
        <div class="logo-zone">
            <span class="waze-ghost">🔹</span>
            <h1>HUB InfoRoute France (TeamClosure)</h1>
        </div>
        <div class="sync-zone">
            <a href="index.html" class="btn-hub-back">🏠 Accueil Hub</a>
            <button id="btn-sync-all" class="btn-primary">🔄 Synchroniser tout</button>
            <span id="sync-status">Dernière synchro : Jamais</span>
        </div>
    </header>

    <div class="app-container">
        
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Filtres & Vue</h2>
                <button id="btn-reset-filters" class="btn-reset" title="Réinitialiser (Tri décroissant, toutes les alertes)">✖ Effacer</button>
            </div>
        
            <div class="filter-group">
                <input type="text" id="search-bar" placeholder="🔍 Recherche : A43, Col, RN88...">
            </div>
        
            <button id="btn-toggle-sort" class="btn-sort">⬇️ Tri : Date de début (Décroissant)</button>
        
            <div class="filter-group border-top-dash">
                <label>⚡ Accès rapides</label>
                <div class="quick-actions-grid">
                    <button id="btn-quick-today" class="btn-quick">Aujourd'hui</button>
                    <button id="btn-quick-tomorrow" class="btn-quick">Demain</button>
                    <button id="btn-quick-week" class="btn-quick">Cette semaine</button>
                    <button id="btn-quick-next-week" class="btn-quick">Semaine pro.</button>
                    <button id="btn-quick-month" class="btn-quick">Ce mois-ci</button>
                    <button id="btn-quick-next-month" class="btn-quick" style="grid-column: span 2;">Mois prochain</button>
                </div>
                <label class="checkbox-container mt-10">
                    <input type="checkbox" id="filter-current-only">
                     🟢 Actif en ce moment même
                </label>
            </div>
            
            <div class="filter-group border-top-dash">
                <label>🎯 Critères de blocage</label>
                
                <select id="filter-dept" class="mb-5">
                    <option value="all">📍 Tous les départements</option>
                </select>
                
                <select id="filter-type" class="mb-5">
                    <option value="all">🏷️ Toutes les natures (Multitags)</option>
                    <option value="Fermeture">⛔ Fermeture / Blocage Total</option>
                    <option value="Alternat">🚧 Travaux avec Alternat / Restriction</option>
                    <option value="Accident">💥 Accident / Incident</option>
                    <option value="Météo">❄️ Météo / Viabilité</option>
                    <option value="Incendie">🔥 Incendie</option>
                    <option value="Déviation">↔️ Déviation</option>
                    <option value="Bouchon">🚗 Bouchon / Ralentissement</option>
                </select>
        
                <select id="filter-severity">
                    <option value="all">⚠️ Toutes les gravités</option>
                    <option value="danger">🔴 Rouge : Bloquant Impératif</option>
                    <option value="warning">🟠 Orange : Fermeture à vérifier</option>
                    <option value="info">🔘 Gris : Mineur / Alternat</option>
                </select>
            </div>

            <div class="filter-group text-sm">
                <label class="checkbox-container">
                    <input type="checkbox" id="filter-has-doc">
                    <span>📎 Uniquement avec document joint</span>
                </label>
            </div>
            
            <div class="filter-group text-sm">
                <label class="checkbox-container text-muted">
                    <input type="checkbox" id="filter-show-blacklist">
                    👁️ Voir les alertes masquées/suspectes
                </label>
            </div>
        
            <div class="filter-group border-top-dash">
                <label>📅 Période personnalisée</label>
                
                <div class="date-bounds-container mt-5">
                    <!-- Choix de la cible -->
                    <label class="sub-label">Appliquer le filtre sur :</label>
                    <select id="filter-date-target" class="mb-5" style="width: 100%;">
                        <option value="start">🚩 Date de début de l'alerte</option>
                        <option value="end">🏳️ Date de fin de l'alerte</option>
                    </select>
            
                    <!-- Bornes Min / Max -->
                    <div class="flex-row mt-5">
                        <span style="font-size:0.8rem; width:40px; align-self:center;">Du :</span>
                        <input type="date" id="filter-date-min" style="flex:1;">
                    </div>
                    <div class="flex-row mt-5">
                        <span style="font-size:0.8rem; width:40px; align-self:center;">Au :</span>
                        <input type="date" id="filter-date-max" style="flex:1;">
                    </div>
                </div>
            </div>
        
            <div class="stats-box">
                <h3>📊 Statistiques</h3>
                <p>Alertes affichées : <strong id="stat-total">0</strong></p>
                <div id="stats-by-severity" class="stats-severity-container"></div>
                <hr class="mini-spacer">
                <div id="stats-by-dept"></div>
            </div>
        </aside>

        <main class="content-area">
            <div class="content-toolbar">
                <div class="view-switcher">
                    <button id="btn-view-grid" class="btn-view-toggle active" title="Vue Grille">⣿ Cartes</button>
                    <button id="btn-view-table" class="btn-view-toggle" title="Vue Tableau">⌸ Tableau</button>
                </div>
            </div>

            <div id="loader" class="loader hidden">Chargement et normalisation des flux Inforoute...</div>
            
            <div id="alerts-grid" class="alerts-grid">
                <div class="empty-state">
                    Aucune donnée chargée. Cliquez sur "Synchroniser tout" pour récupérer les flux en direct.
                </div>
            </div>
        </main>

    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
